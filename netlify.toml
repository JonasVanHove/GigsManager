# ─────────────────────────────────────────────────────────────────────────────
# Netlify build configuration for GigsManager (Next.js 14 + Prisma)
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "git fetch --unshallow --tags 2>/dev/null || git fetch --tags 2>/dev/null || true && npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION        = "20"
  # Git clone settings
  GIT_LFS_ENABLED = "false"
  # Prisma needs the engine for the Lambda runtime
  PRISMA_CLI_QUERY_ENGINE_TYPE = "library"
  # Suppress false positive: NEXT_PUBLIC_* vars are intentionally public
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL"

# ─── Next.js Runtime Plugin ──────────────────────────────────────────────────

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Headers ─────────────────────────────────────────────────────────────────

# Static assets with long-term caching
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next.js public folder assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts with long-term caching
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images with moderate caching
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Icons with long caching
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Manifest and browserconfig
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/browserconfig.xml"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type  = "application/xml"

# API routes with shorter caching
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    X-Content-Type-Options       = "nosniff"
    Cache-Control                = "public, max-age=60, s-maxage=3600"

# HTML pages with revalidation
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options    = "DENY"
    X-XSS-Protection   = "1; mode=block"
    Referrer-Policy     = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Cache-Control      = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://supabase.co wss://; frame-ancestors 'none'"

# ─── Redirects ───────────────────────────────────────────────────────────────
# SPA fallback handled automatically by @netlify/plugin-nextjs
